<!DOCTYPE html>
<html>
<head>
    <title>Frame Navigasi</title>

    <style>
        body {
            margin: 0;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        iframe {
            border: none;
        }

        .menu {
            width: 25%;
        }

        .konten {
            width: 75%;
        }
    </style>
</head>

<body>

<div class="container">
    
    <!-- KIRI (MENU) -->
    <iframe src="menu.html" name="menu" class="menu"></iframe>

    <!-- KANAN (KONTEN) -->
    <iframe src="home.html" name="konten" class="konten"></iframe>

</div>

</body>
</html>
